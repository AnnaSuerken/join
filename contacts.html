<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Join - Contacts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="shortcut icon" href="./assets/icons/favicon-32x32.png" type="image/x-icon">

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/assets.css" />
    <link rel="stylesheet" href="./css/contacts.css" />
    <link rel="stylesheet" href="./css/join-help.css" />

    <!-- Utility-Klasse für Screenreader-Only Labels -->
    <style>
      .visually-hidden {
        position: absolute !important;
        width: 1px; height: 1px;
        padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0 0 0 0);
        white-space: nowrap; border: 0;
      }
    </style>

    <!-- Auth-Guard: Module sind per Default deferred, blocken also nicht das Parsing -->
    <script type="module">
      import { requireAuth } from "./js/authguard.js";
      import { logout } from "./js/logout.js";
      await requireAuth({ redirectTo: "/login.html" });
      window.logout = logout; // optional verfügbar machen
    </script>

    <script src="./js/firebase.js"></script>
    <script src="./js/contacts.js"></script>
  </head>
  <body>
    <!-- <div id="heckbock" class="checkbox">
      <h2>Are you Sure</h2>
      <button>Yes</button>
      <button>No</button>
    </div> -->

    <div class="page">
      <!-- Sidebar -->
      <aside class="content-left">
        <img src="./assets/imgs/join_logo_white.svg" alt="Join Logo" />

        <nav class="nav-bar" aria-label="Hauptnavigation">
          <a class="nav-item" href="./index.html">
            <img src="./assets/icons/summary.svg" alt="" aria-hidden="true" />
            <span>Summary</span>
          </a>
          <a class="nav-item" href="./add-task.html">
            <img src="./assets/icons/addtask.svg" alt="" aria-hidden="true" />
            <span>Add Task</span>
          </a>
          <a class="nav-item" href="./board.html">
            <img src="./assets/icons/board.svg" alt="" aria-hidden="true" />
            <span>Board</span>
          </a>
          <a class="nav-item active" href="./contacts.html" aria-current="page">
            <img src="./assets/icons/contacts.svg" alt="" aria-hidden="true" />
            <span>Contacts</span>
          </a>
        </nav>

        <div class="nav-bar-links">
          <a href="./privacy-policy.html">Privacy Policy</a>
          <a href="./legal-notice.html">Legal notice</a>
        </div>
      </aside>

      <!-- Main -->
      <main class="main">
        <header class="topbar">
          <div class="tool-name">Kanban Project Management Tool</div>
          <div class="top-right">
            <button class="small-icon jh-help-btn" type="button" aria-label="Hilfe">?</button>
            <div class="avatar small" aria-hidden="true">SM</div>
          </div>
        </header>

        <section class="content">
          <!-- Liste links -->
          <div class="list">
            <div class="list-head">
              <button class="btn" id="openAddModal" type="button">Add new contact ▾</button>
            </div>
          </div>

          <!-- Detail rechts -->
          <div class="detail">
            <div class="detail-top">
              <h1 class="detail-title">
                Contacts <span class="pipe">|</span>
                <span class="light">Better with a team</span>
              </h1>
            </div>
            <div class="detail-card">
              <p>No contact selected.</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal: Add Contact -->
    <div class="modal-overlay" id="contactModal" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalSub">
        <button class="modal-close" id="modalCloseBtn" type="button" aria-label="Close"></button>

        <div class="modal-left">
          <div class="modal-brand">
            <img src="./assets/imgs/join_logo_white.svg" alt="" class="brand-logo" aria-hidden="true" />
          </div>
          <h2 class="modal-title" id="modalTitle">Add contact</h2>
          <p class="modal-sub" id="modalSub">Tasks are better with a team!</p>
          <div class="modal-underline" aria-hidden="true"></div>
        </div>

        <div class="modal-right">
          <form id="contactForm" autocomplete="off">
            <div class="form-avatar">
              <div class="avatar big" id="formAvatar" aria-hidden="true">?</div>
            </div>

            <div class="form-field">
              <label class="visually-hidden" for="nameInput">Name</label>
              <input type="text" id="nameInput" placeholder="Name" required autocomplete="name" />
            </div>
            <div class="form-field">
              <label class="visually-hidden" for="emailInput">Email</label>
              <input type="email" id="emailInput" placeholder="Email" required autocomplete="email" />
            </div>
            <div class="form-field">
              <label class="visually-hidden" for="phoneInput">Phone</label>
              <input type="tel" id="phoneInput" placeholder="Phone" required autocomplete="tel" />
            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
              <button type="submit" class="btn" id="submitBtn">Create contact</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal Steuerung -->
    <script>
      (() => {
        const overlay = document.getElementById('contactModal');
        const dialog  = overlay?.querySelector('.modal');
        const openBtn = document.getElementById('openAddModal');
        const closeBtn= document.getElementById('modalCloseBtn');
        const cancel  = document.getElementById('cancelBtn');
        let triggerEl = null;

        const open = () => {
          triggerEl = document.activeElement;
          overlay.hidden = false;
          overlay.classList.add('is-open');
          dialog.classList.remove('is-leaving');
          dialog.classList.add('is-entering');
          document.body.style.overflow = 'hidden';
          setTimeout(() => document.getElementById('nameInput')?.focus(), 0);
        };

        const close = () => {
          dialog.classList.remove('is-entering');
          dialog.classList.add('is-leaving');
          setTimeout(() => {
            overlay.classList.remove('is-open');
            overlay.hidden = true;
            dialog.classList.remove('is-leaving');
            document.body.style.overflow = '';
            triggerEl?.focus();
          }, 300);
        };

        openBtn?.addEventListener('click', open);
        closeBtn?.addEventListener('click', close);
        cancel?.addEventListener('click', (e) => { e.preventDefault(); close(); });
        overlay?.addEventListener('click', (e) => { if (e.target === overlay) close(); });
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !overlay.hidden) close(); });
      })();
    </script>

    <!-- App-Skripte: per defer, damit nicht blockiert -->
    <script src="./js/firebase.js" defer></script>
    <script src="./js/contacts.js" defer></script>
    <script src="./js/join-help.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (window.JoinHelp && typeof JoinHelp.init === 'function') {
          JoinHelp.init();
        }
      });
    </script>
  </body>
</html>
